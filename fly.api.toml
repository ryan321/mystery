# MysteryTrove API — deploy with: fly deploy -c fly.api.toml
# Region iad sits next to the Neon database (aws us-east-1).
app = "mysterytrove-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.api"

[env]
  PORT = "8787"
  # Browsers allowed to call the API (comma-separated).
  CORS_ORIGINS = "https://mysterytrove.com,https://www.mysterytrove.com,https://mysterytrove-web.fly.dev"
  # Public origins for magic-link emails and the Google OAuth dance.
  API_ORIGIN = "https://api.mysterytrove.com"
  WEB_ORIGIN = "https://mysterytrove.com"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep one machine warm: mid-game turns should never wait on a cold start.
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"

[checks]
  [checks.health]
    type = "http"
    port = 8787
    path = "/v1/cases"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
